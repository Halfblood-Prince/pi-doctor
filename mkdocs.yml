site_name: pi-doctor
site_description: Human-first Raspberry Pi diagnostics
site_url: https://halfblood-prince.github.io/pi-doctor/
repo_url: https://github.com/Halfblood-Prince/pi-doctor
repo_name: Halfblood-Prince/pi-doctor
edit_uri: edit/main/docs/
docs_dir: docs
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy
markdown_extensions:
  - admonition
  - toc:
      permalink: true
nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - CLI Contract: cli-contract.md
  - Exit Codes: exit-codes.md
  - JSON Schema: json-schema.md
  - Hardware Matrix: hardware-matrix.md
