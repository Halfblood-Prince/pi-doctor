name: Bug report
description: Report a reproducible pi-doctor problem without sharing private data.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not paste secrets, private hostnames, serial numbers, raw support bundles, or personal email addresses.
  - type: input
    id: version
    attributes:
      label: pi-doctor version
      placeholder: "pi-doctor 1.0.0"
    validations:
      required: true
  - type: input
    id: system
    attributes:
      label: System
      placeholder: "Raspberry Pi 5, Raspberry Pi OS Bookworm 64-bit"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command, with paths or identifiers sanitized.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste sanitized output only.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or JSON
      description: Structured logs from stderr or `--json` output, sanitized before posting.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets, private hostnames, serial numbers, personal paths, and personal email addresses.
          required: true
