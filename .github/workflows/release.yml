name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest
    env:
      PI_DOCTOR_BUILD_REVISION: ${{ github.sha }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
          - target: armv7-unknown-linux-gnueabihf

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 88f49ff79e777bef6d3564531636ee4d3cc2f8d2 --locked

      - name: Build release binary
        run: cross build -p pi-doctor --release --target ${{ matrix.target }}

      - name: Package archive
        run: |
          chmod +x scripts/package-release.sh
          scripts/package-release.sh \
            --target ${{ matrix.target }} \
            --binary target/${{ matrix.target }}/release/pi-doctor

      - name: Generate SBOM
        run: |
          version="${GITHUB_REF_NAME#v}"
          python3 scripts/generate-sbom.py \
            --version "$version" \
            --target ${{ matrix.target }} \
            --output "dist/pi-doctor-v${version}-${{ matrix.target }}.sbom.json"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/pi-doctor-v*-${{ matrix.target }}.tar.gz
            dist/pi-doctor-v*-${{ matrix.target }}.tar.gz.sha256
            dist/pi-doctor-v*-${{ matrix.target }}.sbom.json

      - name: Upload target artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/pi-doctor-v*-${{ matrix.target }}.tar.gz
            dist/pi-doctor-v*-${{ matrix.target }}.tar.gz.sha256
            dist/pi-doctor-v*-${{ matrix.target }}.sbom.json

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Flatten artifact layout
        run: |
          find dist -mindepth 2 -type f -name '*.tar.gz' -exec cp {} dist/ \;
          find dist -mindepth 2 -type f -name '*.sha256' -exec cp {} dist/ \;
          find dist -mindepth 2 -type f -name '*.sbom.json' -exec cp {} dist/ \;

      - name: Build combined checksums
        run: |
          (
            cd dist
            sha256sum *.tar.gz > SHA256SUMS
          )
          cp scripts/install.sh dist/install.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.sbom.json
            dist/SHA256SUMS
            dist/install.sh
