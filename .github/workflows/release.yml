name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  preflight:
    name: release preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check release tag matches Cargo version
        run: |
          python3 - <<'PY'
          import os
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"]
          if not tag.startswith("v"):
              raise SystemExit(f"release tag must start with v, got {tag!r}")

          tag_version = tag[1:]
          with open("Cargo.toml", "rb") as handle:
              manifest = tomllib.load(handle)
          cargo_version = manifest["workspace"]["package"]["version"]

          if tag_version != cargo_version:
              raise SystemExit(
                  "release tag version does not match Cargo workspace package version: "
                  f"tag={tag_version}, cargo={cargo_version}"
              )

          print(f"release version preflight passed: {tag_version}")
          PY

  build:
    name: build-${{ matrix.target }}
    needs: preflight
    runs-on: ubuntu-latest
    env:
      PI_DOCTOR_BUILD_REVISION: ${{ github.sha }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-gnu
          - target: aarch64-unknown-linux-musl
          - target: armv7-unknown-linux-gnueabihf
          - target: armv7-unknown-linux-musleabihf

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 88f49ff79e777bef6d3564531636ee4d3cc2f8d2 --locked

      - name: Build release binary
        run: cross build -p pi-doctor --release --locked --target ${{ matrix.target }}

      - name: Build host helper for completions
        run: cargo build -p pi-doctor --release --locked

      - name: Package archive
        run: |
          version="${GITHUB_REF_NAME#v}"
          chmod +x scripts/package-release.sh
          scripts/package-release.sh \
            --target ${{ matrix.target }} \
            --binary target/${{ matrix.target }}/release/pi-doctor \
            --completions-binary target/release/pi-doctor \
            --version "$version"

      - name: Generate SBOM
        run: |
          version="${GITHUB_REF_NAME#v}"
          python3 scripts/generate-sbom.py \
            --version "$version" \
            --target ${{ matrix.target }} \
            --output "dist/pi-doctor-v${version}-${{ matrix.target }}.sbom.json"

      - name: Upload target artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/pi-doctor-v*-${{ matrix.target }}.tar.gz
            dist/pi-doctor-v*-${{ matrix.target }}.tar.gz.sha256
            dist/pi-doctor-v*-${{ matrix.target }}.sbom.json

  release-verification:
    name: release verification
    needs: preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.9 --locked

      - name: cargo audit
        run: cargo audit --deny warnings

      - name: cargo deny
        run: cargo deny check advisories bans licenses sources

      - name: Build and test Debian package
        run: |
          chmod +x debian/rules debian/tests/smoke scripts/*.sh
          docker run --rm -v "$PWD:/src" -w /src debian:unstable-slim sh -euxc '
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              ca-certificates \
              build-essential \
              devscripts \
              equivs \
              lintian \
              autopkgtest
            mk-build-deps --install --remove --tool "apt-get -y --no-install-recommends" debian/control
            dpkg-buildpackage -us -uc -b
            lintian --pedantic --fail-on error ../pi-doctor_*.changes
            autopkgtest ../pi-doctor_*.changes -- null
          '

  attest:
    needs: [build, release-verification]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Flatten artifact layout
        run: |
          find dist -mindepth 2 -type f -name '*.tar.gz' -exec cp {} dist/ \;
          find dist -mindepth 2 -type f -name '*.sha256' -exec cp {} dist/ \;
          find dist -mindepth 2 -type f -name '*.sbom.json' -exec cp {} dist/ \;

      - name: Build combined checksums
        run: |
          (
            cd dist
            sha256sum *.tar.gz > SHA256SUMS
            sha256sum SHA256SUMS > SHA256SUMS.sha256
          )
          cp scripts/install.sh dist/install.sh
          (
            cd dist
            sha256sum install.sh > install.sh.sha256
          )

      - name: Attest release assets
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.sbom.json
            dist/SHA256SUMS
            dist/install.sh

      - name: Upload release asset bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.sbom.json
            dist/SHA256SUMS
            dist/install.sh

  publish:
    needs: attest
    runs-on: ubuntu-latest

    steps:
      - name: Download attested release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.sbom.json
            dist/SHA256SUMS
            dist/install.sh

  post-release-debian-unstable:
    name: post-release Debian unstable
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and test in a clean Debian unstable environment
        run: |
          chmod +x debian/rules debian/tests/smoke scripts/*.sh
          version="${GITHUB_REF_NAME#v}"
          docker run --rm --privileged \
            -e RELEASE_VERSION="$version" \
            -v "$PWD:/src" \
            -w /src \
            debian:unstable-slim \
            sh -euxc '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates \
                devscripts \
                build-essential \
                lintian \
                sbuild \
                autopkgtest \
                dput-ng \
                debian-keyring \
                equivs \
                schroot

              mk-build-deps --install --remove --tool "apt-get -y --no-install-recommends" debian/control
              uscan --force-download
              dpkg-buildpackage -S -sa -us -uc

              lintian -i "../pi-doctor_${RELEASE_VERSION}_source.changes"
              autopkgtest . -- null
              sbuild-createchroot unstable /srv/chroot/unstable-amd64-sbuild http://deb.debian.org/debian
              sbuild -d unstable "../pi-doctor_${RELEASE_VERSION}.dsc"
            '
