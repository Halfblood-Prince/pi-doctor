name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
          - target: armv7-unknown-linux-gnueabihf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: cross build -p pi-doctor --release --target ${{ matrix.target }}

      - name: Package archive
        run: |
          chmod +x scripts/package-release.sh
          scripts/package-release.sh \
            --target ${{ matrix.target }} \
            --binary target/${{ matrix.target }}/release/pi-doctor

      - name: Upload target artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/pi-doctor-v*-${{ matrix.target }}.tar.gz
            dist/pi-doctor-v*-${{ matrix.target }}.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact layout
        run: |
          find dist -type f -name '*.tar.gz' -exec cp {} dist/ \;
          find dist -type f -name '*.sha256' -exec cp {} dist/ \;

      - name: Build combined checksums
        run: |
          (
            cd dist
            sha256sum *.tar.gz > SHA256SUMS
          )
          cp scripts/install.sh dist/install.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/SHA256SUMS
            dist/install.sh
