name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  target-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cargo check
        run: cargo check --workspace --target ${{ matrix.target }}

  install-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build -p pi-doctor --release

      - name: Package local archive
        run: |
          chmod +x scripts/package-release.sh
          scripts/package-release.sh \
            --target x86_64-unknown-linux-gnu \
            --binary target/release/pi-doctor

      - name: Install from local archive
        run: |
          chmod +x scripts/install.sh
          mkdir -p .tmp/bin
          archive="$(ls dist/*.tar.gz)"
          scripts/install.sh \
            --archive "$archive" \
            --bin-dir "$PWD/.tmp/bin"
          "$PWD/.tmp/bin/pi-doctor" --version

      - name: README install section exists
        run: grep -nE "^## Install|install.sh|Homebrew|Debian" README.md
