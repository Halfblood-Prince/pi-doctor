name: pi-doctor
base: core22
version: git
summary: Diagnose Raspberry Pi system issues
description: |
  CLI tool to diagnose Raspberry Pi system, camera, GPIO,
  thermal, and Python environment issues.

grade: stable
confinement: strict

apps:
  pi-doctor:
    command: bin/pi-doctor-cli
    plugs:
      - hardware-observe
      - system-observe
      - gpio
      - mount-observe

parts:
  pi-doctor:
    plugin: rust
    source: .
    build-packages:
      - pkg-config
      - libssl-dev
    override-build: |
      cargo build --release -p pi-doctor-cli
      install -Dm755 target/release/pi-doctor-cli $SNAPCRAFT_PART_INSTALL/bin/pi-doctor-cli
